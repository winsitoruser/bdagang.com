version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bedagang-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-bedagang_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bedagang}"]
      interval: 10s
      timeout: 5s
      retries: 5

  store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedagang-store
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-bedagang}
      - NODE_ENV=development
      - PORT=3001
      - NEXTAUTH_URL=${STORE_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-bedagang-secret-key}
      - APP_NAME=BEDAGANG-STORE
    volumes:
      - store_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # admin:
  #   build:
  #     context: ./admin-panel
  #     dockerfile: Dockerfile
  #   container_name: bedagang-admin
  #   restart: always
  #   ports:
  #     - "3002:3002"
  #   environment:
  #     - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-bedagang}
  #     - NODE_ENV=production
  #     - PORT=3002
  #     - NEXTAUTH_URL=${ADMIN_URL:-http://localhost:3002}
  #     - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-bedagang-admin-secret-key}
  #     - APP_NAME=BEDAGANG-ADMIN
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  postgres_data:
  store_uploads:
