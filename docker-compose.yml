version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bedagang-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: bedagang_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bedagang_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedagang-store
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: supersecurepassword
      DB_NAME: bedagang_dev
      DATABASE_URL: postgresql://postgres:supersecurepassword@db:5432/bedagang_dev
      NODE_ENV: production
      PORT: 3001
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: change-this-secret
      APP_NAME: BEDAGANG-STORE
    volumes:
      - store_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: bedagang_postgres_data
  store_uploads:
    name: bedagang_store_uploads